name: Integration test (regtest)

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'docker-compose*.yml'
      - '.env*'
      - 'config/**'
      - '.github/workflows/integration-test.yaml'

permissions: {}

jobs:
  regtest:
    name: Regtest stack
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COMPOSE_PROJECT_NAME: z3-regtest
      COMPOSE_FILE: docker-compose.yml:docker-compose.regtest.yml
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate TLS certs
        run: |
          mkdir -p config/tls
          openssl req -x509 -newkey rsa:2048 \
            -keyout config/tls/zaino.key -out config/tls/zaino.crt \
            -sha256 -days 1 -nodes -subj "/CN=localhost" 2>/dev/null

      - name: Generate zallet identity
        run: |
          mkdir -p config/regtest
          echo "# dummy identity for CI" > config/regtest/zallet_identity.txt

      - name: Generate zallet RPC pwhash
        run: |
          SALT=$(openssl rand -hex 16)
          HASH=$(printf 'zebra' | openssl dgst -sha256 -mac HMAC -macopt "key:$SALT" | awk '{print $NF}')
          PWHASH="${SALT}\$${HASH}"
          sed -i "s|__GENERATED_BY_INIT_SH__|${PWHASH}|" config/regtest/zallet.toml

      - name: Start Zebra
        run: |
          docker compose --env-file .env.regtest up -d zebra
          echo "Waiting for Zebra RPC..."
          for i in $(seq 1 60); do
            if curl -sf -X POST -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"getblockchaininfo","params":[],"id":1}' \
              http://127.0.0.1:18232 > /dev/null 2>&1; then
              echo "Zebra is ready"
              break
            fi
            sleep 2
          done

      - name: Mine initial block
        run: |
          curl -sf -u zebra:zebra -X POST -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"generate","params":[1],"id":1}' \
            http://127.0.0.1:18232 | jq .

      - name: Start Zaino
        run: |
          docker compose --env-file .env.regtest up -d zaino
          echo "Waiting for Zaino gRPC port..."
          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/127.0.0.1/8137' 2>/dev/null; then
              echo "Zaino is ready"
              break
            fi
            sleep 2
          done

      - name: Verify Zaino is running
        run: |
          docker compose --env-file .env.regtest ps zaino --format json | jq -e '.[0].State == "running"'
          echo "Zaino is running"

      - name: Verify Zebra RPC through Zaino
        run: |
          curl -sf -X POST -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"getblockchaininfo","params":[],"id":1}' \
            http://127.0.0.1:8237 | jq .result.chain
          echo "Zaino JSON-RPC proxy is working"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Zebra logs ==="
          docker compose --env-file .env.regtest logs zebra --tail 50
          echo "=== Zaino logs ==="
          docker compose --env-file .env.regtest logs zaino --tail 50
          echo "=== Zallet logs ==="
          docker compose --env-file .env.regtest logs zallet --tail 50
          echo "=== Container status ==="
          docker compose --env-file .env.regtest ps

      - name: Teardown
        if: always()
        run: docker compose --env-file .env.regtest down --volumes
