zebra:
  enabled: True
  name: zebra
  testnet: false
  image:
    repository: zfnd/zebra
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  additionalEnv: {}
  volumes:
    data:
      size: 400Gi
      storageClass: default
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 2
      memory: 4Gi
    limits:
      memory: 16Gi

